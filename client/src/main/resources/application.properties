# LRA Coordinator Client REST Client Configuration

# Configure the REST client for LRACoordinatorProxy
lra-coordinator-service/mp-rest/uri=${lra.coordinator.url:http://localhost:8080/lra-coordinator}
lra-coordinator-service/mp-rest/connectTimeout=30000
lra-coordinator-service/mp-rest/readTimeout=30000
lra-coordinator-service/mp-rest/scope=jakarta.inject.Singleton

# Enable REST client logging
lra-coordinator-service/mp-rest/providers=org.jboss.resteasy.plugins.providers.jackson.ResteasyJackson2Provider